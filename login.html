<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Autocenter Säntis – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Roboto Condensed',sans-serif;background:#000;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;}
.logo{font-family:'Montserrat',sans-serif;font-weight:800;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:#fff;margin-bottom:6px;text-align:center;}
.logo span{color:#FF6E40;}
.bars{display:inline-flex;gap:3px;align-items:flex-end;margin-right:10px;vertical-align:middle;}
.bars i{display:block;width:5px;background:#FF6E40;}
.bars i:nth-child(1){height:7px;}.bars i:nth-child(2){height:11px;}.bars i:nth-child(3){height:9px;}.bars i:nth-child(4){height:14px;}
.sub{font-family:'Roboto Condensed',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:40px;text-align:center;}
.box{background:#111;border:1px solid #222;border-radius:10px;padding:32px;width:100%;max-width:360px;}
.box h2{font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#fff;margin-bottom:24px;text-align:center;}
label{font-family:'Montserrat',sans-serif;font-weight:600;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#666;display:block;margin-bottom:6px;margin-top:18px;}
label:first-of-type{margin-top:0;}
input{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:5px;padding:12px 14px;font-family:'Roboto Condensed',sans-serif;font-size:15px;color:#fff;outline:none;transition:border-color .2s;}
input:focus{border-color:#FF6E40;}
button{width:100%;margin-top:24px;background:#FF6E40;color:#fff;border:none;border-radius:5px;padding:13px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .2s;}
button:hover{background:#e85a2d;}
button:disabled{opacity:.6;cursor:not-allowed;}
.err{margin-top:12px;background:rgba(231,76,60,.12);border:1px solid #E74C3C;border-radius:5px;padding:10px 14px;font-size:12px;color:#ff8a7a;display:none;text-align:center;}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg);}}
.footer{margin-top:28px;font-family:'Roboto Condensed',sans-serif;font-size:11px;color:#333;text-align:center;letter-spacing:1px;}
</style>
</head>
<body>
<div class="logo"><span class="bars"><i></i><i></i><i></i><i></i></span>AUTO<span>CENTER SÄNTIS</span></div>
<div class="sub">Firmenportal</div>
<div class="box">
  <h2>Anmelden</h2>
  <label>Benutzername</label>
  <input type="text" id="username" placeholder="benutzername" autocomplete="username" onkeydown="if(event.key==='Enter')login()">
  <label>Passwort</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()" id="btn">Anmelden</button>
  <div class="err" id="err"></div>
</div>
<div class="footer">© 2026 Autocenter Säntis</div>
<script>
// Redirect if already logged in
fetch('/api/auth/me').then(r=>r.json()).then(u=>{
  if(u){window.location.href=u.role==='admin'?'/portal':'/portal';}
});
function login(){
  var u=document.getElementById('username').value.trim();
  var p=document.getElementById('password').value;
  var err=document.getElementById('err');var btn=document.getElementById('btn');
  err.style.display='none';
  if(!u||!p){err.textContent='Bitte alle Felder ausfüllen.';err.style.display='block';return;}
  btn.innerHTML='<span class="spin"></span>Anmelden...';btn.disabled=true;
  fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})})
  .then(r=>r.json()).then(d=>{
    if(d.ok){
      var redir=new URLSearchParams(window.location.search).get('redirect');
      window.location.href=redir||'/portal';
    }else{
      err.textContent=d.error||'Anmeldung fehlgeschlagen.';err.style.display='block';
      btn.innerHTML='Anmelden';btn.disabled=false;
    }
  }).catch(()=>{err.textContent='Verbindungsfehler.';err.style.display='block';btn.innerHTML='Anmelden';btn.disabled=false;});
}
</script>
</body>
</html>
