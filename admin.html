<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Autocenter Säntis – Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Roboto Condensed',sans-serif;background:#F4F4F4;min-height:100vh;}
header{background:#000;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Montserrat',sans-serif;font-weight:800;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#fff;}
.logo span{color:#FF6E40;}
.bars{display:inline-flex;gap:3px;align-items:flex-end;margin-right:8px;vertical-align:middle;}
.bars i{display:block;width:4px;background:#FF6E40;}
.bars i:nth-child(1){height:6px;}.bars i:nth-child(2){height:9px;}.bars i:nth-child(3){height:7px;}.bars i:nth-child(4){height:11px;}
.h-right{display:flex;align-items:center;gap:10px;}
.btn-hdr{background:none;border:1px solid #333;color:#888;border-radius:4px;padding:5px 12px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.btn-hdr:hover{border-color:#FF6E40;color:#FF6E40;}
.btn-hdr.or{background:#FF6E40;border-color:#FF6E40;color:#fff;}
main{padding:24px 28px;max-width:1200px;margin:0 auto;}
.tab-bar{display:flex;border-bottom:2px solid #E0E0E0;margin-bottom:24px;}
.tab-btn{font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:10px 20px;background:none;border:none;cursor:pointer;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;}
.tab-btn.active{color:#000;border-bottom-color:#FF6E40;}
.card{background:#fff;border-radius:8px;border:1px solid #E0E0E0;overflow:hidden;margin-bottom:20px;}
.c-hd{background:#000;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;}
.c-hd-t{font-family:'Montserrat',sans-serif;font-weight:800;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#fff;}
.c-bd{padding:0 20px 16px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#888;border-bottom:2px solid #FF6E40;padding:8px 10px;text-align:left;}
td{padding:8px 10px;border-bottom:1px solid #F0F0F0;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFAFA;}
.badge{display:inline-block;font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;padding:2px 8px;border-radius:3px;color:#fff;}
.badge-admin{background:#000;}.badge-user{background:#888;}.badge-on{background:#2ECC71;}.badge-off{background:#E74C3C;}
.btn{background:#fff;border:1px solid #E0E0E0;border-radius:4px;padding:5px 12px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.btn:hover{border-color:#FF6E40;color:#FF6E40;}
.btn.p{background:#FF6E40;color:#fff;border-color:#FF6E40;}
.btn.p:hover{background:#e85a2d;}
.btn.d{color:#E74C3C;border-color:#E74C3C;}
.btn.d:hover{background:#E74C3C;color:#fff;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;padding:16px 20px;border-bottom:1px solid #F0F0F0;align-items:flex-end;}
.form-row:last-child{border-bottom:none;}
.f-group{display:flex;flex-direction:column;gap:4px;}
.f-group label{font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#888;}
.f-group input,.f-group select{border:1px solid #E0E0E0;border-radius:4px;padding:7px 10px;font-family:'Roboto Condensed',sans-serif;font-size:13px;outline:none;background:#fff;min-width:120px;}
.f-group input:focus,.f-group select:focus{border-color:#FF6E40;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:#fff;border-radius:10px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-box h3{font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
.m-field{margin-bottom:14px;}
.m-field label{font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#888;display:block;margin-bottom:5px;}
.m-field input,.m-field select{width:100%;border:1px solid #E0E0E0;border-radius:4px;padding:9px 12px;font-family:'Roboto Condensed',sans-serif;font-size:13px;outline:none;}
.m-field input:focus{border-color:#FF6E40;}
.m-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.perm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;max-height:200px;overflow-y:auto;padding:4px;}
.perm-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #E0E0E0;border-radius:5px;cursor:pointer;transition:border-color .15s;}
.perm-item.checked{border-color:#FF6E40;background:#FAECE7;}
.perm-item input[type=checkbox]{accent-color:#FF6E40;}
.perm-item label{font-family:'Roboto Condensed',sans-serif;font-size:13px;cursor:pointer;}
#toast{position:fixed;bottom:20px;right:20px;background:#000;color:#fff;font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;padding:10px 16px;border-radius:4px;z-index:9997;border-left:4px solid #FF6E40;transition:opacity .3s;opacity:0;pointer-events:none;}
</style>
</head>
<body>
<header>
  <div class="logo"><span class="bars"><i></i><i></i><i></i><i></i></span>AUTO<span>CENTER SÄNTIS</span> <span style="color:#666;font-size:13px;margin-left:10px;letter-spacing:1px;">Admin</span></div>
  <div class="h-right">
    <button class="btn-hdr or" onclick="window.location='/portal'">← Portal</button>
    <button class="btn-hdr" onclick="logout()">Abmelden</button>
  </div>
</header>
<main>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-users" onclick="showTab('users')">Benutzer</button>
    <button class="tab-btn" id="tab-apps" onclick="showTab('apps')">Anwendungen</button>
    <button class="tab-btn" id="tab-perms" onclick="showTab('perms')">Berechtigungen</button>
  </div>

  <!-- USERS -->
  <div id="sec-users">
    <div class="card">
      <div class="c-hd"><span class="c-hd-t">Benutzer</span><button class="btn p" onclick="openNewUser()">+ Neuer Benutzer</button></div>
      <div class="c-bd">
        <table><thead><tr><th>Name</th><th>Benutzername</th><th>Rolle</th><th>Status</th><th>Apps</th><th>Aktionen</th></tr></thead>
        <tbody id="users-tbody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- APPS -->
  <div id="sec-apps" style="display:none;">
    <div class="card">
      <div class="c-hd"><span class="c-hd-t">Anwendungen</span><button class="btn p" onclick="openNewApp()">+ Neue App</button></div>
      <div class="c-bd">
        <table><thead><tr><th>Icon</th><th>Name</th><th>App-ID</th><th>URL</th><th>Status</th><th>Aktionen</th></tr></thead>
        <tbody id="apps-tbody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- PERMS -->
  <div id="sec-perms" style="display:none;">
    <div class="card">
      <div class="c-hd"><span class="c-hd-t">Berechtigungen verwalten</span></div>
      <div class="c-bd">
        <table><thead><tr><th>Mitarbeiter</th><th>Rolle</th><th>Zugewiesene Apps</th><th>Aktionen</th></tr></thead>
        <tbody id="perms-tbody"></tbody></table>
      </div>
    </div>
  </div>
</main>

<!-- MODAL USER -->
<div class="modal" id="modal-user" style="display:none;">
  <div class="modal-box">
    <h3 id="mu-title">Neuer Benutzer</h3>
    <input type="hidden" id="mu-id">
    <div class="m-field"><label>Name</label><input id="mu-name" placeholder="Max Muster"></div>
    <div class="m-field"><label>Benutzername</label><input id="mu-username" placeholder="max.muster"></div>
    <div class="m-field"><label>Passwort <span id="mu-pw-hint" style="font-size:9px;color:#aaa;">(leer lassen = nicht ändern)</span></label><input type="password" id="mu-pw" placeholder="Passwort..." autocomplete="new-password"></div>
    <div class="m-field"><label>Rolle</label><select id="mu-role"><option value="user">Mitarbeiter</option><option value="admin">Administrator</option></select></div>
    <div class="m-field"><label>Status</label><select id="mu-active"><option value="true">Aktiv</option><option value="false">Deaktiviert</option></select></div>
    <div class="m-actions">
      <button class="btn" onclick="closeModal('modal-user')">Abbrechen</button>
      <button class="btn p" onclick="saveUser()">Speichern</button>
    </div>
  </div>
</div>

<!-- MODAL APP -->
<div class="modal" id="modal-app" style="display:none;">
  <div class="modal-box">
    <h3 id="ma-title">Neue Anwendung</h3>
    <input type="hidden" id="ma-id">
    <div class="m-field"><label>App-ID <span style="font-size:9px;color:#aaa;">(eindeutig, nur Buchstaben/Zahlen)</span></label><input id="ma-appid" placeholder="zielvereinbarung"></div>
    <div class="m-field"><label>Name</label><input id="ma-name" placeholder="Zielvereinbarung 2026"></div>
    <div class="m-field"><label>Beschreibung</label><input id="ma-desc" placeholder="Kurze Beschreibung..."></div>
    <div class="m-field"><label>Icon (Emoji)</label><input id="ma-icon" placeholder="🎯" style="font-size:20px;" maxlength="4"></div>
    <div class="m-field"><label>Farbe</label><input type="color" id="ma-color" value="#FF6E40" style="height:40px;padding:2px 6px;"></div>
    <div class="m-field"><label>URL <span style="font-size:9px;color:#aaa;">(z.B. /apps/zielvereinbarung/)</span></label><input id="ma-url" placeholder="/apps/meine-app/"></div>
    <div class="m-field"><label>Status</label><select id="ma-active"><option value="true">Aktiv</option><option value="false">Deaktiviert</option></select></div>
    <div class="m-actions">
      <button class="btn" onclick="closeModal('modal-app')">Abbrechen</button>
      <button class="btn p" onclick="saveApp()">Speichern</button>
    </div>
  </div>
</div>

<!-- MODAL PERMISSIONS -->
<div class="modal" id="modal-perms" style="display:none;">
  <div class="modal-box">
    <h3>Berechtigungen für <span id="mp-name"></span></h3>
    <input type="hidden" id="mp-uid">
    <p style="font-family:'Roboto Condensed',sans-serif;font-size:12px;color:#888;margin-bottom:14px;">Wähle welche Apps dieser Benutzer sehen und nutzen darf:</p>
    <div class="perm-grid" id="perm-grid"></div>
    <div class="m-actions">
      <button class="btn" onclick="closeModal('modal-perms')">Abbrechen</button>
      <button class="btn p" onclick="savePerms()">Speichern</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script>
var users=[], apps=[], allPerms=[];

async function init(){
  const me = await fetch('/api/auth/me').then(r=>r.json());
  if(!me||me.role!=='admin'){window.location='/';return;}
  await loadAll();
}

async function loadAll(){
  [users, apps, allPerms] = await Promise.all([
    fetch('/api/admin/users').then(r=>r.json()),
    fetch('/api/admin/apps').then(r=>r.json()),
    fetch('/api/admin/users').then(r=>r.json()).then(us=>us.flatMap(u=>(u.appIds||[]).map(a=>({userId:u._id,appId:a}))))
  ]);
  renderUsers(); renderApps(); renderPerms();
}

function showTab(t){
  ['users','apps','perms'].forEach(n=>{
    document.getElementById('sec-'+n).style.display=n===t?'block':'none';
    document.getElementById('tab-'+n).classList.toggle('active',n===t);
  });
}

function renderUsers(){
  const tb=document.getElementById('users-tbody'); tb.innerHTML='';
  users.forEach(u=>{
    const appCount=(u.appIds||[]).length;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><strong style="font-family:'Montserrat',sans-serif;font-weight:800;">${u.name}</strong></td>`+
      `<td style="color:#888;">${u.username}</td>`+
      `<td><span class="badge badge-${u.role}">${u.role==='admin'?'Admin':'Mitarbeiter'}</span></td>`+
      `<td><span class="badge badge-${u.active!==false?'on':'off'}">${u.active!==false?'Aktiv':'Inaktiv'}</span></td>`+
      `<td style="color:#888;">${appCount} App${appCount!==1?'s':''}</td>`+
      `<td style="display:flex;gap:6px;flex-wrap:wrap;"><button class="btn" onclick="openEditUser('${u._id}')">Bearbeiten</button>`+
      `<button class="btn" onclick="openPerms('${u._id}','${u.name}',${JSON.stringify(u.appIds||[])})">Berechtigungen</button>`+
      (u.username!=='admin'?`<button class="btn d" onclick="delUser('${u._id}','${u.name}')">Löschen</button>`:'')+`</td>`;
    tb.appendChild(tr);
  });
}

function renderApps(){
  const tb=document.getElementById('apps-tbody'); tb.innerHTML='';
  apps.forEach(a=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="font-size:20px;">${a.icon}</td>`+
      `<td><strong style="font-family:'Montserrat',sans-serif;font-weight:800;">${a.name}</strong></td>`+
      `<td><code style="background:#F4F4F4;padding:2px 6px;border-radius:3px;font-size:11px;">${a.appId}</code></td>`+
      `<td style="color:#888;font-size:11px;">${a.url}</td>`+
      `<td><span class="badge badge-${a.active!==false?'on':'off'}">${a.active!==false?'Aktiv':'Inaktiv'}</span></td>`+
      `<td style="display:flex;gap:6px;"><button class="btn" onclick="openEditApp('${a._id}')">Bearbeiten</button>`+
      `<button class="btn d" onclick="delApp('${a._id}','${a.name}')">Löschen</button></td>`;
    tb.appendChild(tr);
  });
}

function renderPerms(){
  const tb=document.getElementById('perms-tbody'); tb.innerHTML='';
  users.filter(u=>u.role!=='admin').forEach(u=>{
    const myApps=(u.appIds||[]).map(aid=>apps.find(a=>a._id===aid)).filter(Boolean);
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><strong style="font-family:'Montserrat',sans-serif;font-weight:800;">${u.name}</strong><div style="font-size:11px;color:#888;">${u.username}</div></td>`+
      `<td><span class="badge badge-user">Mitarbeiter</span></td>`+
      `<td>${myApps.length===0?'<span style="color:#ccc;font-size:12px;">Keine</span>':myApps.map(a=>`<span style="display:inline-flex;align-items:center;gap:4px;background:${a.color}22;border:1px solid ${a.color}44;border-radius:4px;padding:2px 8px;font-size:11px;margin:2px;">${a.icon} ${a.name}</span>`).join('')}</td>`+
      `<td><button class="btn p" onclick="openPerms('${u._id}','${u.name}',${JSON.stringify(u.appIds||[])})">Bearbeiten</button></td>`;
    tb.appendChild(tr);
  });
}

// USERS
function openNewUser(){
  document.getElementById('mu-title').textContent='Neuer Benutzer';
  document.getElementById('mu-id').value='';
  document.getElementById('mu-name').value='';
  document.getElementById('mu-username').value='';
  document.getElementById('mu-pw').value='';
  document.getElementById('mu-role').value='user';
  document.getElementById('mu-active').value='true';
  document.getElementById('mu-username').disabled=false;
  document.getElementById('mu-pw-hint').textContent='';
  document.getElementById('modal-user').style.display='flex';
}
function openEditUser(id){
  const u=users.find(u=>u._id===id);if(!u)return;
  document.getElementById('mu-title').textContent='Benutzer bearbeiten';
  document.getElementById('mu-id').value=id;
  document.getElementById('mu-name').value=u.name;
  document.getElementById('mu-username').value=u.username;
  document.getElementById('mu-username').disabled=true;
  document.getElementById('mu-pw').value='';
  document.getElementById('mu-pw-hint').textContent='(leer lassen = nicht ändern)';
  document.getElementById('mu-role').value=u.role;
  document.getElementById('mu-active').value=u.active!==false?'true':'false';
  document.getElementById('modal-user').style.display='flex';
}
async function saveUser(){
  const id=document.getElementById('mu-id').value;
  const data={name:document.getElementById('mu-name').value.trim(),role:document.getElementById('mu-role').value,active:document.getElementById('mu-active').value==='true'};
  const pw=document.getElementById('mu-pw').value;
  if(pw)data.password_plain=pw;
  if(!id){
    data.username=document.getElementById('mu-username').value.trim().toLowerCase();
    if(!data.username||!data.name||!pw){alert('Alle Felder ausfüllen');return;}
    const r=await fetch('/api/admin/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...data,password:pw})});
    const d=await r.json();if(!d.ok){alert(d.error);return;}
  }else{
    const body={name:data.name,role:data.role,active:data.active};
    if(pw)body.password=pw;
    await fetch('/api/admin/users/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  }
  closeModal('modal-user');await loadAll();toast('✓ Benutzer gespeichert');
}
async function delUser(id,name){
  if(!confirm(`"${name}" wirklich löschen?`))return;
  await fetch('/api/admin/users/'+id,{method:'DELETE'});
  await loadAll();toast('✓ Benutzer gelöscht');
}

// APPS
function openNewApp(){
  document.getElementById('ma-title').textContent='Neue Anwendung';
  document.getElementById('ma-id').value='';
  document.getElementById('ma-appid').value='';
  document.getElementById('ma-name').value='';
  document.getElementById('ma-desc').value='';
  document.getElementById('ma-icon').value='📱';
  document.getElementById('ma-color').value='#FF6E40';
  document.getElementById('ma-url').value='';
  document.getElementById('ma-active').value='true';
  document.getElementById('ma-appid').disabled=false;
  document.getElementById('modal-app').style.display='flex';
}
function openEditApp(id){
  const a=apps.find(a=>a._id===id);if(!a)return;
  document.getElementById('ma-title').textContent='App bearbeiten';
  document.getElementById('ma-id').value=id;
  document.getElementById('ma-appid').value=a.appId;
  document.getElementById('ma-appid').disabled=true;
  document.getElementById('ma-name').value=a.name;
  document.getElementById('ma-desc').value=a.description||'';
  document.getElementById('ma-icon').value=a.icon||'📱';
  document.getElementById('ma-color').value=a.color||'#FF6E40';
  document.getElementById('ma-url').value=a.url||'';
  document.getElementById('ma-active').value=a.active!==false?'true':'false';
  document.getElementById('modal-app').style.display='flex';
}
async function saveApp(){
  const id=document.getElementById('ma-id').value;
  const data={name:document.getElementById('ma-name').value.trim(),description:document.getElementById('ma-desc').value.trim(),icon:document.getElementById('ma-icon').value.trim()||'📱',color:document.getElementById('ma-color').value,url:document.getElementById('ma-url').value.trim(),active:document.getElementById('ma-active').value==='true'};
  if(!id){
    data.appId=document.getElementById('ma-appid').value.trim().replace(/[^a-z0-9\-]/g,'');
    if(!data.appId||!data.name||!data.url){alert('App-ID, Name und URL sind erforderlich');return;}
    const r=await fetch('/api/admin/apps',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const d=await r.json();if(!d.ok){alert(d.error);return;}
  }else{
    await fetch('/api/admin/apps/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  }
  closeModal('modal-app');await loadAll();toast('✓ App gespeichert');
}
async function delApp(id,name){
  if(!confirm(`"${name}" wirklich löschen? Alle Berechtigungen werden ebenfalls entfernt.`))return;
  await fetch('/api/admin/apps/'+id,{method:'DELETE'});
  await loadAll();toast('✓ App gelöscht');
}

// PERMS
function openPerms(userId, name, currentAppIds){
  document.getElementById('mp-name').textContent=name;
  document.getElementById('mp-uid').value=userId;
  const grid=document.getElementById('perm-grid');grid.innerHTML='';
  apps.filter(a=>a.active!==false).forEach(a=>{
    const checked=currentAppIds.includes(a._id);
    const item=document.createElement('div');
    item.className='perm-item'+(checked?' checked':'');
    item.innerHTML=`<input type="checkbox" id="pc-${a._id}" ${checked?'checked':''} onchange="this.closest('.perm-item').classList.toggle('checked',this.checked)">
      <label for="pc-${a._id}" style="display:flex;align-items:center;gap:6px;">${a.icon} ${a.name}</label>`;
    item.onclick=function(e){if(e.target.tagName!=='INPUT'){const cb=this.querySelector('input');cb.checked=!cb.checked;this.classList.toggle('checked',cb.checked);}};
    grid.appendChild(item);
  });
  document.getElementById('modal-perms').style.display='flex';
}
async function savePerms(){
  const userId=document.getElementById('mp-uid').value;
  const checked=[...document.querySelectorAll('#perm-grid input:checked')].map(cb=>cb.id.replace('pc-',''));
  await fetch('/api/admin/permissions/'+userId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({appIds:checked})});
  closeModal('modal-perms');await loadAll();toast('✓ Berechtigungen gespeichert');
}

function closeModal(id){document.getElementById(id).style.display='none';}
async function logout(){await fetch('/api/auth/logout',{method:'POST'});window.location='/';}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2500);}

init();
</script>
</body>
</html>
