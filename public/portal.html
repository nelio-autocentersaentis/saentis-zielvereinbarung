<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Autocenter Säntis – Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Roboto Condensed',sans-serif;background:#F4F4F4;min-height:100vh;}
header{background:#000;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Montserrat',sans-serif;font-weight:800;font-size:20px;letter-spacing:2px;text-transform:uppercase;color:#fff;}
.logo span{color:#FF6E40;}
.bars{display:inline-flex;gap:3px;align-items:flex-end;margin-right:8px;vertical-align:middle;}
.bars i{display:block;width:5px;background:#FF6E40;}
.bars i:nth-child(1){height:7px;}.bars i:nth-child(2){height:11px;}.bars i:nth-child(3){height:9px;}.bars i:nth-child(4){height:14px;}
.h-right{display:flex;align-items:center;gap:16px;}
.h-user{font-family:'Roboto Condensed',sans-serif;font-size:12px;color:#FF6E40;letter-spacing:1px;}
.h-role{font-family:'Roboto Condensed',sans-serif;font-size:10px;color:#666;letter-spacing:2px;text-transform:uppercase;}
.btn-hdr{background:none;border:1px solid #333;color:#888;border-radius:4px;padding:5px 12px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.btn-hdr:hover{border-color:#FF6E40;color:#FF6E40;}
.btn-hdr.or{background:#FF6E40;border-color:#FF6E40;color:#fff;}
main{padding:36px 28px;max-width:1200px;margin:0 auto;}
.welcome{margin-bottom:36px;}
.welcome h1{font-family:'Montserrat',sans-serif;font-weight:800;font-size:28px;color:#000;margin-bottom:6px;}
.welcome p{font-family:'Roboto Condensed',sans-serif;font-size:14px;color:#888;}
.section-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#FF6E40;margin-bottom:18px;padding-left:10px;border-left:4px solid #FF6E40;}
.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin-bottom:40px;}
.app-card{background:#fff;border-radius:10px;border:1px solid #E0E0E0;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;text-decoration:none;display:block;}
.app-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1);}
.app-card-hd{padding:28px 24px 20px;display:flex;align-items:center;gap:16px;}
.app-icon{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.app-name{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;color:#000;margin-bottom:4px;}
.app-desc{font-family:'Roboto Condensed',sans-serif;font-size:12px;color:#888;line-height:1.4;}
.app-card-ft{padding:12px 24px;border-top:1px solid #F4F4F4;display:flex;align-items:center;justify-content:space-between;}
.app-badge{font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:3px;color:#fff;}
.app-arrow{color:#ccc;font-size:18px;}
.empty{text-align:center;padding:60px 20px;color:#888;}
.empty h3{font-family:'Montserrat',sans-serif;font-weight:800;font-size:16px;color:#ccc;margin-bottom:8px;}
#loading{text-align:center;padding:60px;color:#888;font-family:'Roboto Condensed',sans-serif;font-size:14px;letter-spacing:1px;}
.spin{display:inline-block;width:20px;height:20px;border:3px solid #E0E0E0;border-top-color:#FF6E40;border-radius:50%;animation:sp .6s linear infinite;margin-bottom:12px;}
@keyframes sp{to{transform:rotate(360deg);}}
@media(max-width:580px){main{padding:20px 14px;}header{padding:0 14px;}.apps-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <div class="logo"><span class="bars"><i></i><i></i><i></i><i></i></span>AUTO<span>CENTER SÄNTIS</span></div>
  <div class="h-right">
    <div>
      <div class="h-user" id="h-user">–</div>
      <div class="h-role" id="h-role">–</div>
    </div>
    <button class="btn-hdr or" id="btn-admin" style="display:none" onclick="window.location='/admin'">⚙ Admin</button>
    <button class="btn-hdr" onclick="logout()">Abmelden</button>
  </div>
</header>
<main>
  <div class="welcome">
    <h1>Willkommen, <span id="w-name">–</span></h1>
    <p>Wähle eine App um zu starten.</p>
  </div>
  <div class="section-title">Meine Anwendungen</div>
  <div id="loading"><div class="spin"></div><br>Lade Apps...</div>
  <div class="apps-grid" id="apps-grid" style="display:none;"></div>
  <div class="empty" id="empty" style="display:none;">
    <h3>Keine Apps zugewiesen</h3>
    <p>Bitte den Administrator kontaktieren.</p>
  </div>
</main>
<script>
async function init(){
  const me = await fetch('/api/auth/me').then(r=>r.json());
  if(!me){window.location='/';return;}
  document.getElementById('h-user').textContent=me.name;
  document.getElementById('h-role').textContent=me.role==='admin'?'Administrator':'Mitarbeiter';
  document.getElementById('w-name').textContent=me.name.split(' ')[0];
  if(me.role==='admin')document.getElementById('btn-admin').style.display='';

  const apps = await fetch('/api/portal/apps').then(r=>r.json());
  document.getElementById('loading').style.display='none';

  if(!apps||apps.length===0){
    document.getElementById('empty').style.display='block';return;
  }
  const grid=document.getElementById('apps-grid');
  grid.style.display='grid';
  apps.forEach(app=>{
    const card=document.createElement('a');
    card.className='app-card';
    card.href=app.url;
    card.innerHTML=`
      <div class="app-card-hd">
        <div class="app-icon" style="background:${app.color}22;">${app.icon}</div>
        <div>
          <div class="app-name">${app.name}</div>
          <div class="app-desc">${app.description||''}</div>
        </div>
      </div>
      <div class="app-card-ft">
        <span class="app-badge" style="background:${app.color};">${app.icon} Öffnen</span>
        <span class="app-arrow">›</span>
      </div>`;
    grid.appendChild(card);
  });
}
async function logout(){
  await fetch('/api/auth/logout',{method:'POST'});
  window.location='/';
}
init();
</script>
</body>
</html>
